<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Photobooth - Select Layout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Pacifico&display=swap');

        :root {
            --primary-pink: #ff85a2;
            --dark-pink: #f72585;
            --soft-pink: #ffe5ec;
            --glass: rgba(255, 255, 255, 0.75);
            --gold: #ffcc00;
            --sky: #4cc9f0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            background-attachment: fixed;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- LOGO --- */
        .brand-logo {
            position: fixed; top: 25px; right: 30px; z-index: 100;
        }
        .brand-logo img {
            height: 75px; width: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        .brand-logo img:hover { transform: scale(1.1) rotate(-3deg); }

        /* --- Falling Background --- */
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .heart-particle { position: absolute; top: -10%; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* --- Main UI --- */
        .container {
            position: relative; z-index: 10; text-align: center;
            width: 90%; max-width: 1050px; padding: 45px;
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 50px; border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 60px rgba(247, 37, 133, 0.12);
        }

        .header h1 {
            font-family: 'Pacifico', cursive; font-size: 3.8rem;
            color: var(--dark-pink); margin: 0;
            text-shadow: 3px 3px 0px rgba(255, 255, 255, 1);
        }

        .header p { color: #777; margin-bottom: 45px; font-size: 1.2rem; }

        /* --- Grid & Cards --- */
        .layout-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 30px;
        }

        .layout-card {
            background: white; border-radius: 30px; padding: 25px 15px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent; position: relative;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
        }

        .layout-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(247, 37, 133, 0.2);
            border-color: var(--primary-pink);
        }

        .layout-card.active {
            border-color: var(--dark-pink); background: #fff;
            transform: scale(1.08); box-shadow: 0 0 30px rgba(247, 37, 133, 0.25);
        }

        .layout-card img {
            width: 100%; height: 180px; object-fit: contain;
            border-radius: 20px; margin-bottom: 15px;
            background: #fffafa; padding: 8px;
        }

        .layout-card .label { font-weight: 600; color: #444; font-size: 0.9rem; }

        /* --- ✨ Badge Effects --- */
        .badge {
            position: absolute; top: -12px; right: -12px;
            padding: 8px 16px; border-radius: 18px;
            font-size: 0.75rem; font-weight: 900;
            color: white; z-index: 5;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            overflow: hidden; /* สำหรับแสงวิ่ง */
        }

        /* แสงวิ่งผ่าน Badge (Shiny Effect) */
        .badge::after {
            content: ''; position: absolute; top: -50%; left: -60%;
            width: 20%; height: 200%; background: rgba(255,255,255,0.4);
            transform: rotate(30deg); animation: shiny 3s infinite;
        }
        @keyframes shiny { 0% { left: -60%; } 100% { left: 140%; } }

        /* สีและลูกเล่นแต่ละตัว */
        .badge.classic { 
            background: linear-gradient(45deg, #ff9f1c, var(--gold)); 
            border: 2px solid #fff;
        }
        .badge.popular { 
            background: linear-gradient(45deg, #4361ee, var(--sky)); 
            border: 2px solid #fff;
        }
        .badge.new { 
            background: linear-gradient(45deg, #f72585, #ff4d6d);
            border: 2px solid #fff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(247, 37, 133, 0.6); }
            100% { transform: scale(1); }
        }

        /* --- Footer Button --- */
        .start-btn {
            margin-top: 20px;
            background: linear-gradient(45deg, var(--dark-pink), var(--primary-pink));
            color: white; border: none; padding: 20px 100px;
            font-size: 1.5rem; border-radius: 100px; cursor: pointer;
            transition: 0.4s ease; box-shadow: 0 10px 30px rgba(247, 37, 133, 0.4);
            font-family: 'Kanit', sans-serif; font-weight: 600;
            text-transform: uppercase;
        }

        .start-btn:disabled { background: #e0e0e0; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        .start-btn:hover:not(:disabled) { transform: translateY(-5px) scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="brand-logo">
        <img src="assets/Logo.png" alt="Logo">
    </div>

    <div class="bg-blobs" id="heart-bg"></div>

    <div class="container">
        <div class="header">
            <h1>Choose Your Layout</h1>
            <p>📸 เลือกสไตล์ที่ชอบ แล้วไปโพสต์ท่าสุดคิ้วท์กัน! 📸</p>
        </div>

        <div class="layout-grid">
            <div class="layout-card" onclick="select(this, 'polaroid', 1)">
                <span class="badge classic">CLASSIC</span>
                <img src="assets/frames/1รูป/1.png" alt="Polaroid">
                <span class="label">Polaroid (1 Act)</span>
            </div>

            <div class="layout-card" onclick="select(this, 'strip3', 3)">
                <span class="badge popular">POPULAR</span>
                <img src="assets/frames/3รูป/1.png" alt="Strip 3">
                <span class="label">Strip (3 Acts)</span>
            </div>

            <div class="layout-card" onclick="select(this, 'strip4', 4)">
                <img src="assets/frames/4รูปแนวตั้ง/1.png" alt="Full Strip">
                <span class="label">Full Strip (4 Acts)</span>
            </div>

            <div class="layout-card" onclick="select(this, 'grid2x2', 4)">
                <span class="badge new">NEW</span>
                <img src="assets/frames/4รูปgrid/1.png" alt="Grid 2x2">
                <span class="label">Grid 2x2</span>
            </div>
        </div>

        <button id="btn" class="start-btn" disabled onclick="go()">LET'S SHOOT! 💖</button>
    </div>

    <script>
        let selectedLayout = null;
        let selectedCount = 0;

        function select(el, id, count) {
            document.querySelectorAll('.layout-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedLayout = id;
            selectedCount = count;
            document.getElementById('btn').disabled = false;
        }

        function go() {
            if (!selectedLayout) return;
            // ลิงก์ไปยังหน้าถ่ายรูป พร้อมส่งตัวแปร
            window.location.href = `camera.html?layout=${selectedLayout}&count=${selectedCount}`;
        }

        // --- ระบบหัวใจหล่น ---
        function createHeart() {
            const container = document.getElementById('heart-bg');
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerHTML = ['❤️', '💖', '💗', '🎀', '✨'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.2;
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }
        setInterval(createHeart, 450);
    </script>
</body>
</html>
